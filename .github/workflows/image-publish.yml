name: image-publish

# Manual, gated image publish. No automated trigger.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RELEASE to publish image to ghcr.io'
        required: true
      tag:
        description: 'Image tag (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.inputs.confirm == 'RELEASE'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/lightwebinc/subtx-generator:${{ github.event.inputs.tag }}
            ghcr.io/lightwebinc/subtx-generator:latest
          build-args: |
            VERSION=${{ github.event.inputs.tag }}
