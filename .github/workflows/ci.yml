name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci (dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: bitcoin-subtx-generator

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-common
          path: bitcoin-shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: bitcoin-subtx-generator/go.mod
          cache: false

      - name: Run Dagger pipeline
        working-directory: bitcoin-subtx-generator
        env:
          GOWORK: "off"
        run: make ci
